<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        .header { background: #00A699; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #666; font-weight: bold; }
        .value { color: #333; }
        .confirmed { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin: 20px 0; }
        .total { font-size: 20px; font-weight: bold; color: #00A699; text-align: right; margin-top: 20px; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Booking Confirmed!</h1>
        <p>Your stay is all set</p>
    </div>
    <div class="content">
        <p>Hi <span th:text="${guestName}">Guest</span>,</p>
        <div class="confirmed">✓ Your booking has been confirmed by the host</div>
        <div class="detail-row">
            <span class="label">Property</span>
            <span class="value" th:text="${propertyTitle}">Property</span>
        </div>
        <div class="detail-row">
            <span class="label">Check-in</span>
            <span class="value" th:text="${checkIn}">Date</span>
        </div>
        <div class="detail-row">
            <span class="label">Check-out</span>
            <span class="value" th:text="${checkOut}">Date</span>
        </div>
        <div class="detail-row">
            <span class="label">Booking ID</span>
            <span class="value" th:text="${bookingId}">ID</span>
        </div>
        <div class="total">
            Total: ₹<span th:text="${totalPrice}">0</span>
        </div>
    </div>
    <div class="footer">
        <p>StayFinder — Find your perfect stay</p>
    </div>
</div>
</body>
</html>
